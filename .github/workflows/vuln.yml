# Daily govulncheck against main. Non-blocking — a finding fails this
# workflow run for visibility, but the PR gate (ci.yml) is intentionally
# separate so a newly-disclosed vuln in a transitive dep doesn't block
# unrelated work mid-PR.
#
# Source mode: this is a library module — no shipping binary to scan.
# govulncheck walks the import graph from every package under ./... and
# reports the deps reachable from any of them.

name: vuln

on:
  push:
    branches: [main]
  schedule:
    # Daily at 07:23 UTC. The minute is offset so the run doesn't pile up
    # with the on-the-hour cron-storm on GitHub's scheduler.
    - cron: '23 7 * * *'
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: '1.26.3'
  GOVULNCHECK_VERSION: v1.1.4

jobs:
  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          check-latest: false
      - name: install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@${{ env.GOVULNCHECK_VERSION }}
      - name: govulncheck ./...
        run: govulncheck ./...
